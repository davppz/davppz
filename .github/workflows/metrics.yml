# GitHub profile metrics — generated by lowlighter/metrics
# Docs: https://github.com/lowlighter/metrics
#
# Renders `github-metrics.svg` and commits it back to this repo; README.md
# embeds that file. Requires a Personal Access Token stored as the repository
# secret METRICS_TOKEN (see README setup notes / the PR description).
name: Metrics

on:
  # Refresh once a day (06:00 UTC)
  schedule:
    - cron: "0 6 * * *"
  # Allow manual runs from the Actions tab (use this for the very first run)
  workflow_dispatch:
  # Regenerate only when the workflow itself changes — not on every README edit
  push:
    branches: [main]
    paths: [".github/workflows/metrics.yml"]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@v3.34
        with:
          # ── Core ──────────────────────────────────────────────────────
          token: ${{ secrets.METRICS_TOKEN }}
          user: davppz
          filename: github-metrics.svg
          template: classic
          # Affects habits/active-hours & calendar bucketing — change if needed
          config_timezone: Europe/Stockholm

          # ── Built-in base sections ────────────────────────────────────
          base: header, activity, community, repositories, metadata

          # ── Plugins (professional set) ────────────────────────────────
          # Bio / introduction card
          plugin_introduction: yes

          # 1-year isometric commit calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Most-used languages (weighted by recent edits)
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # Coding habits & active hours
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # Recent activity feed
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_visibility: all

          # Lines of code changed
          plugin_lines: yes

          # Issues / pull-request follow-up
          plugin_followup: yes

          # Achievements (badges)
          plugin_achievements: yes
          plugin_achievements_threshold: C

          # Notable contributions to organizations / popular repos
          plugin_notable: yes

          # Followers & following
          plugin_people: yes
          plugin_people_types: followers, following
